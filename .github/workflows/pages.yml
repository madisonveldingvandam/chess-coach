name: Test + deploy Chess Coach frontend

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv sync --group dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        run: uv run pytest

      - name: Generate optional static dashboard data
        env:
          STATIC_USERNAME: ${{ vars.CHESS_COACH_STATIC_USERNAME }}
          STATIC_TIME_CLASS: ${{ vars.CHESS_COACH_STATIC_TIME_CLASS || 'blitz' }}
          STATIC_ARCHIVE_MONTHS: ${{ vars.CHESS_COACH_STATIC_ARCHIVE_MONTHS || '6' }}
        run: |
          if [ -n "$STATIC_USERNAME" ]; then
            uv run python scripts/generate_static_dashboard.py \
              --username "$STATIC_USERNAME" \
              --time-class "$STATIC_TIME_CLASS" \
              --max-archives "$STATIC_ARCHIVE_MONTHS"
          fi

      - name: Build frontend for GitHub Pages
        working-directory: frontend
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
